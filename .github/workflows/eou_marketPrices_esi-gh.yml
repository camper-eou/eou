#
# .
# в”њв”Ђв”Ђ .github/
# в”‚   в””в”Ђв”Ђ workflows/
# в”‚       в””в”Ђв”Ђ eou_marketPrices_esi-gh.yml
# в”‚
# в”њв”Ђв”Ђ requirements/
# в”‚   в””в”Ђв”Ђ eou_marketPrices_esi-gh_requirements.txt
# в”‚
# в”њв”Ђв”Ђ scripts/
# в”‚   в””в”Ђв”Ђ esi/
# в”‚       в”њв”Ђв”Ђ eou_marketPrices_esi-gh_fetch.py
# в”‚       в”‚   # Cliente ESI y mГЎquina de estados de paginaciГіn/reintentos.
# в”‚       в”‚   # Gestiona:
# в”‚       в”‚   # - regiones pГєblicas
# в”‚       в”‚   # - estructuras autenticadas
# в”‚       в”‚   # - RetryBudget global
# в”‚       в”‚   # - rotaciГіn de tokens
# в”‚       в”‚   # - observaciГіn de Last-Modified y mГ©tricas HTTP
# в”‚       в”‚
# в”‚       в”њв”Ђв”Ђ eou_marketPrices_esi-gh_metrics.py
# в”‚       в”‚   # CГЎlculo de precios representativos BUY/SELL e IFM.
# в”‚       в”‚   # Implementa:
# в”‚       в”‚   # - analyze_buy / compute_buy
# в”‚       в”‚   # - analyze_sell / compute_sell
# в”‚       в”‚   # - detecciГіn de highliners / lowliners
# в”‚       в”‚
# в”‚       в”њв”Ђв”Ђ eou_marketPrices_esi-gh_pipeline.py
# в”‚       в”‚   # Pipeline principal del workflow.
# в”‚       в”‚   # Orquesta:
# в”‚       в”‚   # - carga de estado y autotuning
# в”‚       в”‚   # - lectura de SDE / ESI ya publicados en landu-eou/eou
# в”‚       в”‚   # - lectura de tokens desde Google Sheets
# в”‚       в”‚   # - planificaciГіn de workers
# в”‚       в”‚   # - ingesta ESI -> SQLite temporal
# в”‚       в”‚   # - detecciГіn de hubs
# в”‚       в”‚   # - agregaciГіn universe / hubs / hub individual
# в”‚       в”‚   # - escritura de marketPices.json.gz y hubs.json
# в”‚       в”‚   # - reconstrucciГіn de pages cache
# в”‚       в”‚   # - escritura de run_metrics
# в”‚       в”‚
# в”‚       в”њв”Ђв”Ђ eou_marketPrices_esi-gh_sde.py
# в”‚       в”‚   # Lectura de fuentes base desde landu-eou/eou.
# в”‚       в”‚   # Carga:
# в”‚       в”‚   # - data/sde/regions.jsonl.gz
# в”‚       в”‚   # - data/sde/stations.jsonl.gz
# в”‚       в”‚   # - data/esi/structures.jsonl.gz
# в”‚       в”‚
# в”‚       в”њв”Ђв”Ђ eou_marketPrices_esi-gh_sheet.py
# в”‚       в”‚   # Escritura del estado del workflow en Google Sheets.
# в”‚       в”‚   # Actualiza:
# в”‚       в”‚   # - B12 = status
# в”‚       в”‚   # - D12 = next_run
# в”‚       в”‚   # - I12 = last_modified (si corresponde)
# в”‚       в”‚
# в”‚       в”њв”Ђв”Ђ eou_marketPrices_esi-gh_sheets.py
# в”‚       в”‚   # Lectura readonly de access tokens desde Google Sheets.
# в”‚       в”‚   # Lee access_tokens!D2:D12, limpia vacГ­os/espacios e invierte:
# в”‚       в”‚   # D12 -> D11 -> ... -> D2
# в”‚       в”‚
# в”‚       в”њв”Ђв”Ђ eou_marketPrices_esi-gh_sqlite.py
# в”‚       в”‚   # Capa SQLite temporal local del run.
# в”‚       в”‚   # Incluye:
# в”‚       в”‚   # - creaciГіn de tabla orders
# в”‚       в”‚   # - PRAGMA de rendimiento
# в”‚       в”‚   # - patrГіn single-writer
# в”‚       в”‚   # - dedupe por order_id conservando issued mayor
# в”‚       в”‚
# в”‚       в”њв”Ђв”Ђ eou_marketPrices_esi-gh_tuning.py
# в”‚       в”‚   # Estado operativo y autotuning entre runs.
# в”‚       в”‚   # Subcomandos:
# в”‚       в”‚   # - init
# в”‚       в”‚   # - finalize-success
# в”‚       в”‚   # - finalize-failure
# в”‚       в”‚   # Gestiona:
# в”‚       в”‚   # - status
# в”‚       в”‚   # - next_run
# в”‚       в”‚   # - failed
# в”‚       в”‚   # - current / best / history
# в”‚       в”‚
# в”‚       в””в”Ђв”Ђ eou_marketPrices_esi-gh_types.py
# в”‚           # DetecciГіn robusta del fichero de tipos SDE.
# в”‚           # Busca candidatos conocidos y, si falta, escanea data/sde/*.jsonl.gz
# в”‚           # hasta encontrar claves typeID + type.
# в”‚
# в”њв”Ђв”Ђ states/
# в”‚   в””в”Ђв”Ђ eou_marketPrices_esi-gh_pages.json
# в”‚       # Cache histГіrico de pГЎginas observadas por entidad.
# в”‚       # Se usa para balancear carga entre workers en runs futuros.
# в”‚       # Formato:
# в”‚       # {
# в”‚       #   "stations":   [{ "regionID", "region", "pages" }, ...],
# в”‚       #   "structures": [{ "stationID", "station", "pages" }, ...]
# в”‚       # }
# в”‚
# в”њв”Ђв”Ђ tuning/
# в”‚   в””в”Ђв”Ђ eou_marketPrices_esi-gh.json
# в”‚       # Estado persistente del autotuning del workflow.
# в”‚       # Guarda:
# в”‚       # - status
# в”‚       # - next_run
# в”‚       # - failed
# в”‚       # - current
# в”‚       # - best
# в”‚       # - history (Гєltimos 5 runs)
# в”‚
# в”њв”Ђв”Ђ .tmp/
# в”‚   в”њв”Ђв”Ђ eou_marketPrices_esi-gh_run_metrics.json
# в”‚   в”‚   # MГ©tricas internas del run actual.
# в”‚   в”‚   # Alimenta el finalize-success del tuning.
# в”‚   в”‚   #
# в”‚   в””в”Ђв”Ђ eou_marketPrices_esi-gh_finalize_summary.json
# в”‚       # Resumen temporal para proyectar status/next_run/last_modified
# в”‚       # hacia Google Sheets.
# в”‚
# в””в”Ђв”Ђ landu/                          # checkout temporal de landu-eou/eou dentro del runner
#     в””в”Ђв”Ђ data/
#         в”њв”Ђв”Ђ esi/
#         в”‚   в”њв”Ђв”Ђ marketPices.json.gz
#         в”‚   в”‚   # Salida principal final del workflow.
#         в”‚   в”‚   # Formato:
#         в”‚   в”‚   # - gzip
#         в”‚   в”‚   # - NDJSON
#         в”‚   в”‚   # - una lГ­nea JSON compacta por typeID
#         в”‚   в”‚   #
#         в”‚   в”њв”Ђв”Ђ hubs.json
#         в”‚   в”‚   # Resumen de hubs detectados:
#         в”‚   в”‚   # - nГєmero de hubs
#         в”‚   в”‚   # - total de Гіrdenes
#         в”‚   в”‚   # - hubsList ordenada
#         в”‚   в”‚   #
#         в”‚   в””в”Ђв”Ђ structures.jsonl.gz
#         в”‚       # Entrada de estructuras con mercado, usada como truth set.
#         в”‚
#         в””в”Ђв”Ђ sde/
#             в”њв”Ђв”Ђ regions.jsonl.gz
#             в”‚   # Entrada de regiones del universo EVE.
#             в”‚   #
#             в”њв”Ђв”Ђ stations.jsonl.gz
#             в”‚   # Entrada de estaciones NPC para resolver nombres de hubs.
#             в”‚   #
#             в””в”Ђв”Ђ <types file detectado>
#                 # Uno de:
#                 # - types.jsonl.gz
#                 # - typeIDs.jsonl.gz
#                 # - items.jsonl.gz
#                 # - types_min.jsonl.gz
#                 # - o cualquier .jsonl.gz de data/sde/ con claves typeID + type
#
# Flujo lГіgico resumido del workflow:
# 1) checkout camper-eou/eou
# 2) checkout landu-eou/eou en ./landu
# 3) setup Python + install requirements
# 4) auth Google por WIF
# 5) init tuning + lock inicial
# 6) escritura inicial de estado en Sheets
# 7) sync previa de landu-eou/eou
# 8) pipeline principal:
#    - SDE / estructuras / tipos
#    - tokens desde Sheets
#    - planner + workers
#    - fetch ESI -> SQLite
#    - hubs + precios
#    - marketPices.json.gz + hubs.json
#    - pages cache + run_metrics
# 9) commit conjunto en landu-eou/eou
# 10) finalize-success / finalize-failure
# 11) escritura final en Sheets
# 12) commit de states/ + tuning/ en camper-eou/eou
#

name: ESI Market Prices (ESI в†’ GH)

on:
  workflow_dispatch:
    inputs:
      force_refresh:
        description: "Ignorar cache planner (pages cache) y reconstruir planificaciГіn (usar con cuidado)"
        required: false
        type: boolean
        default: false
      max_workers:
        description: "Valor base de workers internos para autotuning"
        required: false
        type: number
        default: 10
      retry_budget:
        description: "Valor base de retry_budget para autotuning"
        required: false
        type: number
        default: 10

concurrency:
  group: eou_marketPrices_esi_gh
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

defaults:
  run:
    shell: bash

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      LANDU_OWNER: landu-eou
      LANDU_REPO: eou
      LANDU_REF: main
      LANDU_DIR: landu

      OUT_REL: data/esi/marketPices.json.gz
      HUBS_REL: data/esi/hubs.json
      PAGES_CACHE_REL: states/eou_marketPrices_esi-gh_pages.json
      TUNING_STATE_REL: tuning/eou_marketPrices_esi-gh.json

      SHEETS_ID: 1fnoPr1HoO6RuQxoFY_jUVc8yTfiGa0yZ-WaxgOwWJe8
      SHEET_TAB: workflows
      SHEETS_WORKFLOW_ROW: "12"
      LOCK_TIME: 300

      SHEETS_RANGE: access_tokens!D2:D12
      ESI_BASE: https://esi.evetech.net/latest
      ESI_DATASOURCE: tranquility
      ESI_USER_AGENT: "eou-market-prices/1.0 (+https://github.com/camper-eou/eou)"

      RUN_METRICS_PATH: .tmp/eou_marketPrices_esi-gh_run_metrics.json
      FINALIZE_SUMMARY_PATH: .tmp/eou_marketPrices_esi-gh_finalize_summary.json

      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      # Repo de trabajo: camper-eou/eou
      - name: Checkout (camper-eou/eou)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Repo de salida: landu-eou/eou
      - name: Checkout output repo (landu-eou/eou)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.LANDU_OWNER }}/${{ env.LANDU_REPO }}
          ref: ${{ env.LANDU_REF }}
          path: ${{ env.LANDU_DIR }}
          token: ${{ secrets.LANDU_EOU_PAT }}
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements/eou_marketPrices_esi-gh_requirements.txt

      - name: Install deps
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements/eou_marketPrices_esi-gh_requirements.txt

      # AutenticaciГіn recomendada para acceder a Google sin claves estГЎticas.
      - name: Auth to Google (WIF)
        id: gcp_auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      # Estado inicial del run: bloquea siguiente ejecuciГіn y deja status "in progress".
      - name: Initial lock in tuning state
        run: |
          set -euo pipefail
          mkdir -p .tmp

          python "scripts/esi/eou_marketPrices_esi-gh_tuning.py" init \
            --path "${TUNING_STATE_REL}" \
            --base-max-workers "${{ inputs.max_workers }}" \
            --base-retry-budget "${{ inputs.retry_budget }}" \
            --lock-seconds "${LOCK_TIME}" \
            --summary-path "${FINALIZE_SUMMARY_PATH}"

      # Refleja estado inicial en la hoja.
      - name: Write initial status/next_run to Sheets
        run: |
          set -euo pipefail
          python "scripts/esi/eou_marketPrices_esi-gh_sheet.py" \
            --spreadsheet-id "${SHEETS_ID}" \
            --sheet-tab "${SHEET_TAB}" \
            --row "${SHEETS_WORKFLOW_ROW}" \
            --summary-path "${FINALIZE_SUMMARY_PATH}"

      # Sincroniza la rama destino antes de generar salidas.
      - name: Sync landu repo (pre-run)
        env:
          LANDU_EOU_PAT: ${{ secrets.LANDU_EOU_PAT }}
        run: |
          set -euo pipefail
          cd "${LANDU_DIR}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${LANDU_EOU_PAT}@github.com/${LANDU_OWNER}/${LANDU_REPO}.git"
          git pull --rebase origin "${LANDU_REF}"

      # Pipeline principal: ingesta ESI, consolidaciГіn en SQLite y escritura de salidas.
      - name: Run pipeline (fetch в†’ dedupe в†’ compute в†’ write gz/json)
        id: pipeline
        run: |
          set -euo pipefail

          python "scripts/esi/eou_marketPrices_esi-gh_pipeline.py" \
            --landu-root "${LANDU_DIR}" \
            --out "${LANDU_DIR}/${OUT_REL}" \
            --hubs-out "${LANDU_DIR}/${HUBS_REL}" \
            --pages-cache "${PAGES_CACHE_REL}" \
            --tuning-state "${TUNING_STATE_REL}" \
            --run-metrics-path "${RUN_METRICS_PATH}" \
            --sheets-id "${SHEETS_ID}" \
            --sheets-range "${SHEETS_RANGE}" \
            --esi-base "${ESI_BASE}" \
            --datasource "${ESI_DATASOURCE}" \
            --user-agent "${ESI_USER_AGENT}" \
            --base-max-workers "${{ inputs.max_workers }}" \
            --base-retry-budget "${{ inputs.retry_budget }}" \
            $( [ "${{ inputs.force_refresh }}" = "true" ] && echo "--force-refresh" )

      # Commit conjunto de marketPices + hubs en landu-eou/eou.
      - name: Commit marketPices.json.gz + hubs.json (landu-eou/eou)
        id: commit_landu
        if: steps.pipeline.outcome == 'success'
        continue-on-error: true
        env:
          LANDU_EOU_PAT: ${{ secrets.LANDU_EOU_PAT }}
        run: |
          set -euo pipefail

          cd "${LANDU_DIR}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${LANDU_EOU_PAT}@github.com/${LANDU_OWNER}/${LANDU_REPO}.git"

          if [[ -n "$(git status --porcelain)" ]]; then
            git stash push -u -m "ci: stash before pull"
          fi

          git pull --rebase origin "${LANDU_REF}"

          if git stash list | grep -q "ci: stash before pull"; then
            git stash pop || true
          fi

          git add "${OUT_REL}" "${HUBS_REL}" || true
          if git diff --cached --quiet; then
            exit 0
          fi

          git commit -m "EOU: update marketPices.json.gz + hubs.json"

          pushed=0
          for attempt in 1 2 3; do
            if git push origin "${LANDU_REF}"; then
              pushed=1
              break
            fi
            git pull --rebase origin "${LANDU_REF}"
          done

          if [[ "${pushed}" -ne 1 ]]; then
            exit 1
          fi

      # FinalizaciГіn exitosa: actualiza tuning y calcula next_run.
      - name: Finalize tuning state (completed)
        if: always() && steps.commit_landu.outcome == 'success'
        run: |
          set -euo pipefail
          python "scripts/esi/eou_marketPrices_esi-gh_tuning.py" \
            finalize-success \
            --path "${TUNING_STATE_REL}" \
            --metrics-path "${RUN_METRICS_PATH}" \
            --summary-path "${FINALIZE_SUMMARY_PATH}"

      # FinalizaciГіn fallida: incrementa failed y calcula next_run de espera.
      - name: Finalize tuning state (failed)
        if: always() && steps.commit_landu.outcome != 'success'
        run: |
          set -euo pipefail
          python "scripts/esi/eou_marketPrices_esi-gh_tuning.py" \
            finalize-failure \
            --path "${TUNING_STATE_REL}" \
            --summary-path "${FINALIZE_SUMMARY_PATH}"

      # Refleja status/next_run/(last_modified) final en la hoja.
      - name: Write final status/next_run(/last_modified) to Sheets
        if: always()
        run: |
          set -euo pipefail
          python "scripts/esi/eou_marketPrices_esi-gh_sheet.py" \
            --spreadsheet-id "${SHEETS_ID}" \
            --sheet-tab "${SHEET_TAB}" \
            --row "${SHEETS_WORKFLOW_ROW}" \
            --summary-path "${FINALIZE_SUMMARY_PATH}"

      # Commit del estado local del workflow: pages cache + tuning.
      - name: Commit camper state (pages + tuning)
        if: always()
        continue-on-error: true
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "${PAGES_CACHE_REL}" "${TUNING_STATE_REL}" || true
          if git diff --cached --quiet; then
            exit 0
          fi

          git commit -m "EOU: update market prices state"

          pushed=0
          for attempt in 1 2 3; do
            if git push; then
              pushed=1
              break
            fi
            git pull --rebase
          done

          if [[ "${pushed}" -ne 1 ]]; then
            exit 1
          fi

      # El run completo debe marcarse como fallo si no pudo escribirse correctamente en landu-eou/eou.
      - name: Fail job if landu commit was not successful
        if: always() && steps.commit_landu.outcome != 'success'
        run: |
          exit 1
