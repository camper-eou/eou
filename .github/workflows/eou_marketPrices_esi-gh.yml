#
# .
# в”ңв”Җв”Җ .github/
# в”Ӯ   в””в”Җв”Җ workflows/
# в”Ӯ      в””в”Җв”Җ eou_marketPrices_esi-gh.yml
# в”Ӯ
# в”ңв”Җв”Җ requirements/
# в”Ӯ   в””в”Җв”Җ eou_marketPrices_esi-gh_requirements.txt
# в”Ӯ
# в”ңв”Җв”Җ scripts/
# в”Ӯ   в””в”Җв”Җ esi/
# в”Ӯ      в”ңв”Җв”Җ eou_marketPrices_esi-gh_fetch.py
# в”Ӯ      в”Ӯ   # Cliente HTTP ESI, entidades de ingesta, rotaciГіn de tokens,
# в”Ӯ      в”Ӯ   # presupuesto global de retries y mГЎquina de estados page-by-page
# в”Ӯ      в”Ӯ   # para regiones y estructuras.
# в”Ӯ      в”Ӯ
# в”Ӯ      в”ңв”Җв”Җ eou_marketPrices_esi-gh_metrics.py
# в”Ӯ      в”Ӯ   # CГЎlculo robusto de cleanVWAP/IFM para BUY y SELL:
# в”Ӯ      в”Ӯ   # highliners, lowliners, raw/dirty/clean VWAP,
# в”Ӯ      в”Ӯ   # buyUnits/sellUnits y clasificaciГіn secure/normal/weak/insecure.
# в”Ӯ      в”Ӯ
# в”Ӯ      в”ңв”Җв”Җ eou_marketPrices_esi-gh_pipeline.py
# в”Ӯ      в”Ӯ   # OrquestaciГіn principal del run:
# в”Ӯ      в”Ӯ   # carga SDE, elige tuning real, lee tokens de Sheets,
# в”Ӯ      в”Ӯ   # balancea entidades entre workers, ingiere ESI,
# в”Ӯ      в”Ӯ   # deduplica en SQLite, determina hubs,
# в”Ӯ      в”Ӯ   # agrega libros por universo/hubs/hub individual,
# в”Ӯ      в”Ӯ   # escribe marketPices.json.gz y hubs.json,
# в”Ӯ      в”Ӯ   # reconstruye pages cache y actualiza run_metrics/tuning.
# в”Ӯ      в”Ӯ
# в”Ӯ      в”ңв”Җв”Җ eou_marketPrices_esi-gh_sde.py
# в”Ӯ      в”Ӯ   # Lectura de fuentes SDE/ESI ya versionadas en landu:
# в”Ӯ      в”Ӯ   # regions.jsonl.gz, stations.jsonl.gz y structures.jsonl.gz.
# в”Ӯ      в”Ӯ
# в”Ӯ      в”ңв”Җв”Җ eou_marketPrices_esi-gh_sheet.py
# в”Ӯ      в”Ӯ   # Escritura del estado del workflow en Google Sheets:
# в”Ӯ      в”Ӯ   # status -> B, next_run -> D, last_modified -> I.
# в”Ӯ      в”Ӯ
# в”Ӯ      в”ңв”Җв”Җ eou_marketPrices_esi-gh_sheets.py
# в”Ӯ      в”Ӯ   # Lectura readonly de access tokens desde Google Sheets
# в”Ӯ      в”Ӯ   # (access_tokens!D2:D12), filtrado, trim e inversiГіn D12 -> D2.
# в”Ӯ      в”Ӯ
# в”Ӯ      в”ңв”Җв”Җ eou_marketPrices_esi-gh_sqlite.py
# в”Ӯ      в”Ӯ   # Base SQLite temporal del run:
# в”Ӯ      в”Ӯ   # tabla orders, PRAGMAs, writer Гәnico con cola,
# в”Ӯ      в”Ӯ   # UPSERT por order_id y conservaciГіn del issued mГЎs reciente.
# в”Ӯ      в”Ӯ
# в”Ӯ      в”ңв”Җв”Җ eou_marketPrices_esi-gh_tuning.py
# в”Ӯ      в”Ӯ   # Estado operativo del workflow:
# в”Ӯ      в”Ӯ   # init, finalize-success y finalize-failure,
# в”Ӯ      в”Ӯ   # manejo de status, next_run, failed y summary temporal.
# в”Ӯ      в”Ӯ
# в”Ӯ      в””в”Җв”Җ eou_marketPrices_esi-gh_types.py
# в”Ӯ          # DetecciГіn robusta del fichero de tipos en data/sde/
# в”Ӯ          # y carga de pares typeID/type.
# в”Ӯ
# в”ңв”Җв”Җ states/
# в”Ӯ   в””в”Җв”Җ eou_marketPrices_esi-gh_pages.json
# в”Ӯ      # Cache histГіrico de pГЎginas por regiГіn y estructura.
# в”Ӯ      # Se usa para planificar mejor el reparto entre workers
# в”Ӯ      # en el siguiente run.
# в”Ӯ
# в”ңв”Җв”Җ tuning/
# в”Ӯ   в””в”Җв”Җ eou_marketPrices_esi-gh.json
# в”Ӯ      # Estado persistente de autotuning y control operativo:
# в”Ӯ      # status, next_run, failed, current, best e history.
# в”Ӯ
# в”ңв”Җв”Җ .tmp/
# в”Ӯ   в”ңв”Җв”Җ eou_marketPrices_esi-gh_run_metrics.json
# в”Ӯ   в”Ӯ   # MГ©tricas temporales del run actual:
# в”Ӯ   в”Ӯ   # requests, retries, score, maxLastModified, etc.
# в”Ӯ   в”Ӯ
# в”Ӯ   в””в”Җв”Җ eou_marketPrices_esi-gh_finalize_summary.json
# в”Ӯ       # Resumen temporal para proyectar el estado en Google Sheets
# в”Ӯ       # antes y despuГ©s del pipeline.
# в”Ӯ
# в””в”Җв”Җ landu/                         # checkout temporal de landu-eou/eou dentro del runner
#    в””в”Җв”Җ data/
#       в”ңв”Җв”Җ sde/
#       в”Ӯ   в”ңв”Җв”Җ regions.jsonl.gz
#       в”Ӯ   в”Ӯ   # Fuente de verdad de regiones del universo.
#       в”Ӯ   в”Ӯ
#       в”Ӯ   в”ңв”Җв”Җ stations.jsonl.gz
#       в”Ӯ   в”Ӯ   # Fuente de verdad de estaciones NPC con market.
#       в”Ӯ   в”Ӯ
#       в”Ӯ   в””в”Җв”Җ <types-file>.jsonl.gz
#       в”Ӯ       # Fichero detectado automГЎticamente que contiene
#       в”Ӯ       # al menos las claves typeID y type.
#       в”Ӯ
#       в””в”Җв”Җ esi/
#          в”ңв”Җв”Җ structures.jsonl.gz
#          в”Ӯ   # Fuente de verdad de estructuras con mercado
#          в”Ӯ   # que se intentan ingerir con autenticaciГіn.
#          в”Ӯ
#          в”ңв”Җв”Җ marketPices.json.gz
#          в”Ӯ   # Salida final principal del workflow:
#          в”Ӯ   # NDJSON gzip, una lГӯnea por typeID,
#          в”Ӯ   # con universe, hubs agregados y cada hub individual.
#          в”Ӯ
#          в””в”Җв”Җ hubs.json
#              # Salida final secundaria:
#              # hubs detectados, orders totales, share por hub
#              # y nГәmero de types por hub.
#

name: ESI Market Prices (ESI вҶ’ GH)

on:
  workflow_dispatch:
    inputs:
      force_refresh:
        description: "Ignorar cache planner (pages cache) y reconstruir planificaciГіn (usar con cuidado)"
        required: false
        type: boolean
        default: false
      max_workers:
        description: "Valor base de workers internos para autotuning"
        required: false
        type: number
        default: 10
      retry_budget:
        description: "Valor base de retry_budget para autotuning"
        required: false
        type: number
        default: 10

concurrency:
  group: eou_marketPrices_esi_gh
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

defaults:
  run:
    shell: bash

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      LANDU_OWNER: landu-eou
      LANDU_REPO: eou
      LANDU_REF: main
      LANDU_DIR: landu

      OUT_REL: data/esi/marketPices.json.gz
      HUBS_REL: data/esi/hubs.json
      PAGES_CACHE_REL: states/eou_marketPrices_esi-gh_pages.json
      TUNING_STATE_REL: tuning/eou_marketPrices_esi-gh.json

      SHEETS_ID: 1fnoPr1HoO6RuQxoFY_jUVc8yTfiGa0yZ-WaxgOwWJe8
      SHEET_TAB: workflows
      SHEETS_WORKFLOW_ROW: "12"
      LOCK_TIME: 300

      SHEETS_RANGE: access_tokens!D2:D12
      ESI_BASE: https://esi.evetech.net/latest
      ESI_DATASOURCE: tranquility
      ESI_USER_AGENT: "eou-market-prices/1.0 (+https://github.com/camper-eou/eou)"

      RUN_METRICS_PATH: .tmp/eou_marketPrices_esi-gh_run_metrics.json
      FINALIZE_SUMMARY_PATH: .tmp/eou_marketPrices_esi-gh_finalize_summary.json

      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      # Repo de trabajo: camper-eou/eou
      - name: Checkout (camper-eou/eou)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Repo de salida: landu-eou/eou
      - name: Checkout output repo (landu-eou/eou)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.LANDU_OWNER }}/${{ env.LANDU_REPO }}
          ref: ${{ env.LANDU_REF }}
          path: ${{ env.LANDU_DIR }}
          token: ${{ secrets.LANDU_EOU_PAT }}
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements/eou_marketPrices_esi-gh_requirements.txt

      - name: Install deps
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements/eou_marketPrices_esi-gh_requirements.txt

      # AutenticaciГіn recomendada para acceder a Google sin claves estГЎticas.
      - name: Auth to Google (WIF)
        id: gcp_auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      # Estado inicial del run: bloquea siguiente ejecuciГіn y deja status "in progress".
      - name: Initial lock in tuning state
        run: |
          set -euo pipefail
          mkdir -p .tmp

          python "scripts/esi/eou_marketPrices_esi-gh_tuning.py" init \
            --path "${TUNING_STATE_REL}" \
            --base-max-workers "${{ inputs.max_workers }}" \
            --base-retry-budget "${{ inputs.retry_budget }}" \
            --lock-seconds "${LOCK_TIME}" \
            --summary-path "${FINALIZE_SUMMARY_PATH}"

      # Refleja estado inicial en la hoja.
      - name: Write initial status/next_run to Sheets
        run: |
          set -euo pipefail
          python "scripts/esi/eou_marketPrices_esi-gh_sheet.py" \
            --spreadsheet-id "${SHEETS_ID}" \
            --sheet-tab "${SHEET_TAB}" \
            --row "${SHEETS_WORKFLOW_ROW}" \
            --summary-path "${FINALIZE_SUMMARY_PATH}"

      # Sincroniza la rama destino antes de generar salidas.
      - name: Sync landu repo (pre-run)
        env:
          LANDU_EOU_PAT: ${{ secrets.LANDU_EOU_PAT }}
        run: |
          set -euo pipefail
          cd "${LANDU_DIR}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${LANDU_EOU_PAT}@github.com/${LANDU_OWNER}/${LANDU_REPO}.git"
          git pull --rebase origin "${LANDU_REF}"

      # Pipeline principal: ingesta ESI, consolidaciГіn en SQLite y escritura de salidas.
      - name: Run pipeline (fetch вҶ’ dedupe вҶ’ compute вҶ’ write gz/json)
        id: pipeline
        run: |
          set -euo pipefail

          python "scripts/esi/eou_marketPrices_esi-gh_pipeline.py" \
            --landu-root "${LANDU_DIR}" \
            --out "${LANDU_DIR}/${OUT_REL}" \
            --hubs-out "${LANDU_DIR}/${HUBS_REL}" \
            --pages-cache "${PAGES_CACHE_REL}" \
            --tuning-state "${TUNING_STATE_REL}" \
            --run-metrics-path "${RUN_METRICS_PATH}" \
            --sheets-id "${SHEETS_ID}" \
            --sheets-range "${SHEETS_RANGE}" \
            --esi-base "${ESI_BASE}" \
            --datasource "${ESI_DATASOURCE}" \
            --user-agent "${ESI_USER_AGENT}" \
            --base-max-workers "${{ inputs.max_workers }}" \
            --base-retry-budget "${{ inputs.retry_budget }}" \
            $( [ "${{ inputs.force_refresh }}" = "true" ] && echo "--force-refresh" )

      # Commit conjunto de marketPices + hubs en landu-eou/eou.
      - name: Commit marketPices.json.gz + hubs.json (landu-eou/eou)
        id: commit_landu
        if: steps.pipeline.outcome == 'success'
        continue-on-error: true
        env:
          LANDU_EOU_PAT: ${{ secrets.LANDU_EOU_PAT }}
        run: |
          set -euo pipefail

          cd "${LANDU_DIR}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${LANDU_EOU_PAT}@github.com/${LANDU_OWNER}/${LANDU_REPO}.git"

          if [[ -n "$(git status --porcelain)" ]]; then
            git stash push -u -m "ci: stash before pull"
          fi

          git pull --rebase origin "${LANDU_REF}"

          if git stash list | grep -q "ci: stash before pull"; then
            git stash pop || true
          fi

          git add "${OUT_REL}" "${HUBS_REL}" || true
          if git diff --cached --quiet; then
            exit 0
          fi

          git commit -m "EOU: update marketPices.json.gz + hubs.json"

          pushed=0
          for attempt in 1 2 3; do
            if git push origin "${LANDU_REF}"; then
              pushed=1
              break
            fi
            git pull --rebase origin "${LANDU_REF}"
          done

          if [[ "${pushed}" -ne 1 ]]; then
            exit 1
          fi

      # FinalizaciГіn exitosa: actualiza tuning y calcula next_run.
      - name: Finalize tuning state (completed)
        if: always() && steps.commit_landu.outcome == 'success'
        run: |
          set -euo pipefail
          python "scripts/esi/eou_marketPrices_esi-gh_tuning.py" \
            finalize-success \
            --path "${TUNING_STATE_REL}" \
            --metrics-path "${RUN_METRICS_PATH}" \
            --summary-path "${FINALIZE_SUMMARY_PATH}"

      # FinalizaciГіn fallida: incrementa failed y calcula next_run de espera.
      - name: Finalize tuning state (failed)
        if: always() && steps.commit_landu.outcome != 'success'
        run: |
          set -euo pipefail
          python "scripts/esi/eou_marketPrices_esi-gh_tuning.py" \
            finalize-failure \
            --path "${TUNING_STATE_REL}" \
            --summary-path "${FINALIZE_SUMMARY_PATH}"

      # Refleja status/next_run/(last_modified) final en la hoja.
      - name: Write final status/next_run(/last_modified) to Sheets
        if: always()
        run: |
          set -euo pipefail
          python "scripts/esi/eou_marketPrices_esi-gh_sheet.py" \
            --spreadsheet-id "${SHEETS_ID}" \
            --sheet-tab "${SHEET_TAB}" \
            --row "${SHEETS_WORKFLOW_ROW}" \
            --summary-path "${FINALIZE_SUMMARY_PATH}"

      # Commit del estado local del workflow: pages cache + tuning.
      - name: Commit camper state (pages + tuning)
        if: always()
        continue-on-error: true
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "${PAGES_CACHE_REL}" "${TUNING_STATE_REL}" || true
          if git diff --cached --quiet; then
            exit 0
          fi

          git commit -m "EOU: update market prices state"

          pushed=0
          for attempt in 1 2 3; do
            if git push; then
              pushed=1
              break
            fi
            git pull --rebase
          done

          if [[ "${pushed}" -ne 1 ]]; then
            exit 1
          fi

      # El run completo debe marcarse como fallo si no pudo escribirse correctamente en landu-eou/eou.
      - name: Fail job if landu commit was not successful
        if: always() && steps.commit_landu.outcome != 'success'
        run: |
          exit 1
